<!DOCTYPE html> 
<html lang="en"> 
<head> 
  <meta charset="UTF-8" /> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0" /> 
  <title>SkyCast</title> 
  <link rel="stylesheet" href="style.css" /> 
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet"> 
</head> 
  <body> 
    <div class="container"> 
      <h1>🌤️ SkyCast</h1> 
      <input type="text" id="cityInput" placeholder="Enter city/country name" /> 
      <button onclick="getWeather()">Get Weather</button> <div id="weatherResult"></div> 
       <div class="box">💧 Humidity<br><b id="humidity">--</b></div>
        <div class="box">🌬 Wind<br><b id="wind">--</b></div>
        <div class="box">🌡 Feels<br><b id="feels">--</b></div>
        <div class="box">👁 Visibility<br><b id="visibility">--</b></div>
    </div> 
    <div class="forecast" id="forecast"></div>
    <footer> <p>Made with ❤️ by <strong>Faith Umali</strong> — @codewithfaithy😉</p>
    </footer> <script src="script.js"></script> 
  </body> 
</html>
