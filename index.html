<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌤 SkyCast v2</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<div class="bg"></div>

<div class="container">

    <!-- HEADER -->
    <div class="header">
        <h1>🌤 SkyCast</h1>
        <button id="darkToggle" onclick="toggleDarkMode()">🌙</button>
    </div>

    <!-- GREETING -->
    <p id="greeting"></p>

    <!-- SEARCH -->
    <div class="search">
        <input type="text" id="cityInput" placeholder="Search city...">

        <button onclick="getWeather()">
            🔍 Search
        </button>

        <button onclick="getLocation()">
            📍 Use My Location
        </button>
    </div>

    <!-- LIVE CLOCK -->
    <div id="clock"></div>

    <!-- LOADING -->
    <div id="loading">☁ Loading Weather...</div>

    <!-- WEATHER RESULT -->
    <div id="weatherResult"></div>

    <!-- 5 DAY FORECAST -->
    <div id="forecast"></div>

    <!-- EXTRAS -->
    <div class="extras">

        <div>
            <h3>⭐ Favorites</h3>
            <ul id="favoriteList"></ul>
        </div>

        <div>
            <h3>📜 History</h3>
            <ul id="historyList"></ul>
        </div>

    </div>

    <!-- WEATHER TIP -->
    <div class="tip">
        <h3>💡 Weather Tip</h3>
        <p id="tip">Search a city to get weather tips</p>
    </div>

</div>

<footer>
Made with ❤️ by Faith Umali • @codewithfaithy 😉
</footer>

<script src="script.js"></script>

</body>
</html>
